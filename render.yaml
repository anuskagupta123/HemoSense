services:
  - type: web
    name: hemosense
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --log-file - --workers 2 --threads 4 --timeout 120
    envVars:
      - key: HEMO_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.9
