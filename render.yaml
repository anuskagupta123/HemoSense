services:
  - type: web
    name: hemosense
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    envVars:
      - key: HEMO_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: hemosense-db
          property: connectionString

databases:
  - name: hemosense-db
