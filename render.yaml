services:
  - type: web
    name: hemosense
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app --log-file - --workers 2 --threads 4 --timeout 120
    envVars:
      - key: HEMO_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: hemosense-db
          property: connectionString

databases:
  - name: hemosense-db
